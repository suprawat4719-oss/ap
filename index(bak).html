     changelog v1.7: แก้ autofillVendor เคลียร์ field ก่อน overwrite (ป้องกันธนาคาร vendor เก่าค้าง),
       payment modal ใช้ vendor master เป็นหลักสำหรับข้อมูลธนาคาร (ไม่เชื่อ inv.vendorBank ที่อาจบันทึกผิด),
       อัปเดต sidebar version/วันที่ให้ตรงกับ title
     changelog v1.6: ปุ่มจ่ายตรงจากตาราง, AP→Finance sync, syncStatus badge, retry sync
     changelog v1.5: แก้บัค 6 จุด — saveInvoice crash, f-vendorRef, OCR headers, Settings API key, autofillVendor, try/catch
     changelog v1.4: เพิ่ม vendorBankName, OCR prompt แม่นขึ้น
     changelog v1.3: รองรับใบวางบิล, OCR อ่าน prePmts, ธนาคารเจ้าหนี้
     changelog v1.2: OCR ด้วย Claude API
     changelog v1.1: แก้ 3 บัค
     changelog v1.0: ระบบ AP ครั้งแรก
-->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP System | v1.7 — 2026-05-19</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #18181b; --ink2: #3f3f46; --ink3: #71717a; --ink4: #a1a1aa;
  --bg: #fafaf9; --bg2: #f5f4f1; --bg3: #eeece8;
  --white: #ffffff;
  --border: #e4e2dd; --border2: #d4d2cc;
  --accent: #7c3aed; --accent-light: #f5f3ff; --accent-mid: #ddd6fe;
  --orange: #c2410c; --orange-light: #fff7ed; --orange-mid: #fed7aa;
  --green: #15803d; --green-light: #f0fdf4; --green-mid: #bbf7d0;
  --red: #b91c1c; --red-light: #fef2f2; --red-mid: #fecaca;
  --yellow: #92400e; --yellow-light: #fffbeb; --yellow-mid: #fde68a;
  --blue: #1d4ed8; --blue-light: #eff6ff; --blue-mid: #bfdbfe;
  --r: 8px; --r2: 12px;
  --sh: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --sh2: 0 4px 16px rgba(0,0,0,.09), 0 2px 4px rgba(0,0,0,.06);
  --sh3: 0 12px 40px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;min-height:100vh}

/* ── SIDEBAR ── */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--ink);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo .logo-mark{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c4b5fd;letter-spacing:.1em;font-weight:500}
.sidebar-logo .logo-name{font-size:14px;font-weight:700;color:#fff;margin-top:3px}
.sidebar-logo .logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.nav-section{padding:12px 10px 4px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:6px;margin:1px 6px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.65);transition:all .15s;border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:'Sarabun',sans-serif}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar-spacer{flex:1}
.sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.3)}

.main{flex:1;overflow:auto}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.topbar-title{font-size:15px;font-weight:700;color:var(--ink)}
.topbar-sub{font-size:12px;color:var(--ink4);margin-left:2px}
.topbar-space{flex:1}
.content{padding:24px 28px;max-width:1280px}

/* ── CARDS ── */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh);margin-bottom:18px;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.01em}
.card-sub{font-size:11px;color:var(--ink4);margin-left:4px}
.card-body{padding:20px}
.card-footer{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg);display:flex;gap:8px;justify-content:flex-end}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:8px}
.stat-value{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--ink);line-height:1}
.stat-note{font-size:11px;color:var(--ink4);margin-top:6px}
.stat-card.accent .stat-value{color:var(--accent)}
.stat-card.orange .stat-value{color:var(--orange)}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.green .stat-value{color:var(--green)}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.span2{grid-column:span 2}.span3{grid-column:span 3}.span4{grid-column:span 4}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.03em;text-transform:uppercase}
.field input,.field select,.field textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:13.5px;color:var(--ink);background:var(--bg);transition:all .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:var(--white);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.field input[readonly]{background:#f0f0f0;color:var(--ink3);cursor:default}
.field textarea{resize:vertical;min-height:64px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 12px;text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);border-bottom:2px solid var(--border);background:var(--bg2);white-space:nowrap}
.tbl th.r,.tbl td.r{text-align:right}
.tbl th.c,.tbl td.c{text-align:center}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--accent-light)}
.tbl .mono{font-family:'IBM Plex Mono',monospace;font-size:12px}
.tbl .bold{font-weight:700}
.tbl .muted{color:var(--ink4);font-size:12px}

/* ── ITEMS TABLE ── */
.items-tbl{width:100%;border-collapse:collapse;margin-bottom:8px}
.items-tbl th{padding:7px 8px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);border-bottom:2px solid var(--border);background:var(--bg2)}
.items-tbl th.r,.items-tbl td.r{text-align:right}
.items-tbl td{padding:4px 4px;border-bottom:1px solid var(--border)}
.item-inp{border:1px solid transparent;border-radius:5px;padding:5px 7px;font-family:'Sarabun',sans-serif;font-size:13px;color:var(--ink);background:transparent;width:100%;transition:all .14s}
.item-inp:focus{outline:none;border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px rgba(124,58,237,.08)}
.item-inp.r{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;white-space:nowrap}
.badge-pending{background:var(--blue-light);color:var(--blue)}
.badge-partial{background:var(--yellow-light);color:var(--yellow)}
.badge-paid{background:var(--green-light);color:var(--green)}
.badge-overdue{background:var(--red-light);color:var(--red)}
.badge-cancelled{background:#f4f4f5;color:var(--ink4)}

/* ── BUTTONS ── */
.btn{padding:8px 18px;border-radius:var(--r);border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;transition:all .17s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6d28d9;box-shadow:0 4px 12px rgba(124,58,237,.25)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#166534}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:#9a3412}
.btn-outline{background:var(--white);color:var(--ink);border:1.5px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--ink3);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg2)}
.btn-danger{background:var(--red-light);color:var(--red);border:1.5px solid var(--red-mid)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:5px}

/* ── PROGRESS ── */
.progress-wrap{background:var(--border);border-radius:20px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:20px;transition:width .4s}
.progress-bar.green{background:var(--green)}
.progress-bar.orange{background:#f97316}
.progress-bar.red{background:var(--red)}

/* ── SUMMARY BOX ── */
.summary-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;width:280px;margin-left:auto;margin-top:12px}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;color:var(--ink2)}
.s-row .val{font-family:'IBM Plex Mono',monospace;font-size:12.5px}
.s-row.total{border-top:2px solid var(--border2);margin-top:6px;padding-top:10px;font-weight:700;font-size:15px;color:var(--ink)}
.s-row.total .val{font-size:15px;color:var(--accent)}
.s-row.remain .val{color:var(--red);font-weight:700}
.s-row.paid .val{color:var(--green)}

/* ── PAYMENT HISTORY ── */
.pmt-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;background:var(--bg)}
.pmt-item .pmt-icon{font-size:18px;width:32px;text-align:center}
.pmt-item .pmt-info{flex:1}
.pmt-item .pmt-date{font-size:12px;color:var(--ink4)}
.pmt-item .pmt-note{font-size:12px;color:var(--ink3)}
.pmt-item .pmt-amt{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--red);font-size:14px}
.pmt-item .pmt-del{background:none;border:none;cursor:pointer;color:var(--ink4);padding:4px;border-radius:4px;font-size:13px}
.pmt-item .pmt-del:hover{background:var(--red-light);color:var(--red)}

/* ── AGING BARS ── */
.aging-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.aging-label{font-size:12px;font-weight:600;color:var(--ink3);width:100px;flex-shrink:0}
.aging-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:20px;overflow:hidden;position:relative}
.aging-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;transition:width .5s}
.aging-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;width:90px;text-align:right;flex-shrink:0}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filters select,.filters input{border:1.5px solid var(--border);border-radius:var(--r);padding:7px 11px;font-family:'Sarabun',sans-serif;font-size:12.5px;background:var(--white);color:var(--ink)}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--accent)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:var(--white);border-radius:var(--r2);padding:26px;width:500px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3);animation:modalIn .2s ease}
.modal-lg{width:720px}
.modal-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:18px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
@keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── CO GRID ── */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:4px}
.co-card{border:2px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .15s;background:var(--bg)}
.co-card:hover{border-color:var(--accent);background:var(--accent-light)}
.co-card.sel{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.co-card .co-name{font-weight:700;font-size:13px;color:var(--ink);margin-bottom:2px}
.co-card .co-tax{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--ink4)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;padding:11px 18px;border-radius:var(--r);font-size:13.5px;font-weight:600;box-shadow:var(--sh3);transform:translateY(50px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:500;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green);color:#fff}
.toast.err{background:var(--red);color:#fff}
.toast.info{background:var(--ink);color:#fff}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--ink4)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:14px}

/* ── REPORT ── */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.report-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh)}
.report-card-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* ── FILE ATTACH ── */
.file-attach-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);position:relative}
.file-attach-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.file-attach-zone input{display:none}
.file-preview{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-top:8px}
.file-preview .file-icon{font-size:20px;flex-shrink:0}
.file-preview .file-name{font-size:12px;color:var(--ink2);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-preview .file-size{font-size:11px;color:var(--ink4)}
.file-preview .file-del{background:none;border:none;cursor:pointer;color:var(--ink4);font-size:14px;padding:2px 6px;border-radius:4px}
.file-preview .file-del:hover{background:var(--red-light);color:var(--red)}

/* ── SYNC STATUS ── */
.sync-bar{padding:10px 12px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:6px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,255,255,.35);font-family:'IBM Plex Mono',monospace}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#52525b;flex-shrink:0;transition:all .3s}
.sync-dot.online{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.5)}
.sync-dot.syncing{background:#f97316;animation:syncPulse .7s infinite alternate}
.sync-dot.error{background:#ef4444}
@keyframes syncPulse{from{opacity:.4}to{opacity:1}}
.sync-btns{display:flex;gap:5px}
.sync-btn{flex:1;padding:5px 4px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .15s;font-weight:600;text-align:center}
.sync-btn:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.25)}
.sync-btn:disabled{opacity:.35;cursor:not-allowed}
.sync-last{font-size:9px;color:rgba(255,255,255,.2);font-family:'IBM Plex Mono',monospace;text-align:center}

/* ── HAMBURGER ── */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:var(--r);margin-right:4px;flex-shrink:0}
.hamburger span{display:block;width:20px;height:2px;background:var(--ink);border-radius:2px;transition:all .25s}
.hamburger:hover span{background:var(--accent)}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:149;backdrop-filter:blur(2px)}
.sidebar-backdrop.show{display:block}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;background:#18181b;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading-screen.fade-out{opacity:0;pointer-events:none}
.loading-logo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c4b5fd;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px}
.loading-title{font-size:18px;font-weight:700;color:#fff}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:8px 0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:12px;color:rgba(255,255,255,.4);font-family:'IBM Plex Mono',monospace;min-height:18px;text-align:center}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .sidebar{width:200px}
  .content{padding:18px 18px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .report-grid{grid-template-columns:1fr}
  .summary-box{width:240px}
}
@media(max-width:768px){
  .sidebar{position:fixed;inset:0 auto 0 0;z-index:150;width:240px;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:none;height:100%}
  .sidebar.open{transform:translateX(0);box-shadow:var(--sh3)}
  .hamburger{display:flex}
  .layout{display:block}
  .main{min-height:100vh}
  .topbar{padding:0 14px;gap:8px}
  .topbar-title{font-size:14px}
  .topbar-sub{display:none}
  .content{padding:14px 14px;max-width:100%}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .stat-value{font-size:19px}
  .form-grid,.form-grid-3,.form-grid-4{grid-template-columns:1fr;gap:10px}
  .span2,.span3,.span4{grid-column:span 1}
  .report-grid{grid-template-columns:1fr}
  .summary-box{width:100%;margin-top:12px}
  .card{overflow-x:auto}
  .tbl{min-width:520px}
  .modal{width:calc(100vw - 24px);max-width:calc(100vw - 24px);padding:18px 16px}
  .modal-lg{width:calc(100vw - 24px);max-width:calc(100vw - 24px)}
  .toast{right:12px;left:12px;bottom:16px;max-width:none;text-align:center}
  .co-grid{grid-template-columns:1fr}
  .hide-mobile{display:none!important}
}
@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat-value{font-size:17px}
}
</style>
</head>
<body>

<div id="loading-screen">

<script>
'use strict';
// ══════════════════════════════════════
// GLOBAL STATE
// ══════════════════════════════════════
let companies = [];

const LS_DEVICE_NAME = 'ap_device_name';

  vendors: [],
};

// ══════════════════════════════════════

const firebaseConfig = {
  apiKey: "AIzaSyCpyJ0nz1WeV-hysdK1TZQow222Kqb5v8s",
  authDomain: "advance-tracker-cadf5.firebaseapp.com",
  projectId: "advance-tracker-cadf5",
  storageBucket: "advance-tracker-cadf5.firebasestorage.app",
  messagingSenderId: "186461314782",
  appId: "1:186461314782:web:525509bb1a76d13d3cac4f",

let _fbdb = null;

function initFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

async function fbGetAll(col) {
  if (!_fbdb) return null;
  try {
    const snap = await _fbdb.collection(col).get();
    return snap.docs.map(d => ({id: d.id, ...d.data()}));
  } catch(e) { return null; }
}

async function fbSet(col, id, d) {
  if (!_fbdb) return false;
  try {
    await _fbdb.collection(col).doc(id).set({...d, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
    return true;
  } catch(e) { return false; }
}

async function fbUpdate(col, id, d) {
  if (!_fbdb) return false;
  try { await _fbdb.collection(col).doc(id).update(d); return true; } catch(e) { return false; }
}

async function fbDelete(col, id) {
  if (!_fbdb) return false;
  try { await _fbdb.collection(col).doc(id).delete(); return true; } catch(e) { return false; }
}

async function fbGetDoc(col, id) {
  if (!_fbdb) return null;
  try {
    const snap = await _fbdb.collection(col).doc(id).get();
    return snap.exists ? {id: snap.id, ...snap.data()} : null;
  } catch(e) { return null; }
}

// ══════════════════════════════════════
// LOCAL STORAGE
// ══════════════════════════════════════
const SYNC_COLS = ['companies','ap_invoices','vendors'];

// localStorage key map — ป้องกัน double prefix เช่น ap_ + ap_invoices = ap_ap_invoices
const LS_KEY = { companies: 'ap_companies', ap_invoices: 'ap_invoices', vendors: 'ap_vendors' };
function lsSave(col, arr) {
  try { localStorage.setItem(LS_KEY[col] || ('ap_' + col), JSON.stringify(arr)); } catch(e) {}
}
function lsLoad(col) {
  try { const s = localStorage.getItem(LS_KEY[col] || ('ap_' + col)); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}

// ══════════════════════════════════════
// STORE (CRUD with optimistic lock)
// ══════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function storeAdd(col, d) {
  _lastLocalWrite = Date.now();
  const id = uid();
  const enriched = {...d, updatedAt: new Date().toISOString(), updatedBy: _deviceName};
  const fbOk = await fbSet(col, id, enriched);
  if (_fbdb && !fbOk) { toast('บันทึกไม่สำเร็จ — Firebase ตอบกลับผิดพลาด', 'err'); return null; }
  const arr = lsLoad(col) || [];
  arr.push({id, ...enriched});
  lsSave(col, arr);
  return id;
}

async function storeUpdate(col, id, d) {
  _lastLocalWrite = Date.now();
  const updates = {...d, updatedAt: new Date().toISOString(), updatedBy: _deviceName};
  const localDoc = (data[col] || []).find(x => x.id === id);
  const localUpdatedAt = localDoc?.updatedAt ?? null;
  if (_fbdb && localUpdatedAt) {
    const remoteDoc = await fbGetDoc(col, id);
    const remoteUpdatedAt = remoteDoc?.updatedAt ?? null;
    if (remoteDoc && remoteUpdatedAt && remoteUpdatedAt !== localUpdatedAt) {
      const choice = await showConflictDialog(col, localDoc, remoteDoc);
      if (choice === 'cancel') return false;
      if (choice === 'theirs') {
        if (data[col]) { const j = data[col].findIndex(x => x.id === id); if (j >= 0) Object.assign(data[col][j], remoteDoc); if (col === 'companies') companies = data.companies; }
        const arr2 = lsLoad(col) || []; const k = arr2.findIndex(x => x.id === id);
        if (k >= 0) { arr2[k] = remoteDoc; lsSave(col, arr2); }
        toast(`ใช้ข้อมูลจาก ${remoteDoc.updatedBy || 'เครื่องอื่น'} แล้ว`, 'info');
        goPage(_currentPage); return false;
      }
    }
  }
  const fbOk = await fbUpdate(col, id, updates);
  if (_fbdb && !fbOk) { toast('บันทึกไม่สำเร็จ', 'err'); return false; }
  const arr = lsLoad(col) || []; const i = arr.findIndex(x => x.id === id);
  if (i >= 0) { arr[i] = {...arr[i], ...updates}; lsSave(col, arr); }
  if (data[col]) { const j = data[col].findIndex(x => x.id === id); if (j >= 0) Object.assign(data[col][j], updates); if (col === 'companies') companies = data.companies; }
  return true;
}

async function storeDelete(col, id) {
  _lastLocalWrite = Date.now();
  await fbDelete(col, id);
  const arr = (lsLoad(col) || []).filter(x => x.id !== id);
  lsSave(col, arr);
}

function syncLS(col, arr) { lsSave(col, arr); }

// ══════════════════════════════════════
// AP → FINANCE SYNC
// ══════════════════════════════════════
async function isAPFinanceMonthLocked(monthKey) {
  try {
    const cache = JSON.parse(localStorage.getItem('ap_month_locks_cache') || '{}');
    if (cache[monthKey] !== undefined && Date.now() - (cache['__ts_' + monthKey] || 0) < 60000) return cache[monthKey];
  } catch(e) {}
  if (!_fbdb) return false;
  try {
    const snap = await _fbdb.collection('month_locks').doc(monthKey).get();
    const locked = snap.exists && snap.data().locked === true;
    try {
      const cache = JSON.parse(localStorage.getItem('ap_month_locks_cache') || '{}');
      cache[monthKey] = locked;
      cache['__ts_' + monthKey] = Date.now();
      localStorage.setItem('ap_month_locks_cache', JSON.stringify(cache));
    } catch(e) {}
    return locked;
  } catch(e) { return false; }
}

async function findNextOpenAPFinanceDate(paymentDate) {
  const origMonth = paymentDate.slice(0, 7);
  if (!(await isAPFinanceMonthLocked(origMonth))) {
    return { financeDate: paymentDate, financeMonth: origMonth, shifted: false, reason: '' };
  }
  let [y, m] = origMonth.split('-').map(Number);
  for (let i = 0; i < 24; i++) {
    m++; if (m > 12) { m = 1; y++; }
    const candidate = `${y}-${String(m).padStart(2,'0')}`;
    if (!(await isAPFinanceMonthLocked(candidate))) {
      const financeDate = `${candidate}-01`;
      return { financeDate, financeMonth: candidate, shifted: true,
        reason: `จ่ายจริงวันที่ ${paymentDate} แต่เดือน ${origMonth} ปิดงวดแล้ว จึงลงบัญชีในเดือน ${candidate}` };
    }
  }
  throw new Error(`ไม่พบเดือนบัญชีที่เปิดอยู่ภายใน 24 เดือน`);
}

async function syncAPPaymentToFinance(invoice, payment) {
  if (!_fbdb) return null;
  try {
    const existing = await _fbdb.collection('fin_transactions').doc(payment.id).get();
    if (existing.exists) return payment.id;
  } catch(e) {}
  const financeDate = payment.financeDate || payment.date;
  const financeMonth = payment.financeMonth || financeDate.slice(0, 7);
  const vendorName = getVendorName(invoice.vendorId);
  const txDoc = {
    id:                     payment.id,
    type:                   'expense',
    sourceModule:           'ap',
    sourceApp:              'AP',
    sourceType:             'AP_PAYMENT',
    sourcePaymentId:        payment.id,
    sourceRefId:            invoice.id,
    sourceInvoiceId:        invoice.id,
    invoiceNo:              invoice.docNo || '',
    date:                   financeDate,
    transferDate:           financeDate,
    paymentDate:            payment.paymentDate || payment.date,
    monthKey:               financeMonth,
    party:                  vendorName,
    vendorId:               invoice.vendorId || '',
    vendorName:             vendorName,
    category:               'จ่ายชำระเจ้าหนี้',
    amount:                 Number(payment.amount) || 0,
    method:                 payment.method || 'โอนเงิน',
    referenceNo:            payment.ref || invoice.docNo || '',
    originalPaymentMonth:   (payment.date||'').slice(0,7),
    financeMonth:           financeMonth,
    shiftedToNextOpenMonth: payment.shiftedToNextOpenMonth || false,
    note:                   payment.shiftedReason || payment.note || '',
    status:                 'confirmed',
    syncStatus:             'linked',
    createdAt:              payment.createdAt || new Date().toISOString(),
    updatedAt:              new Date().toISOString(),
    createdBy:              'ap_app',
  };
  try {
    await _fbdb.collection('fin_transactions').doc(txDoc.id).set(txDoc);
    _fbdb.collection('audit_logs').add({
      action: 'AP_PAYMENT_SYNCED', app: 'ap', monthKey: financeMonth,
      at: new Date().toISOString(),
      detail: { invoiceId: invoice.id, paymentId: payment.id, amount: txDoc.amount,
                docNo: invoice.docNo, paymentDate: txDoc.paymentDate, financeDate,
                shifted: txDoc.shiftedToNextOpenMonth }
    }).catch(()=>{});
    return txDoc.id;
  } catch(err) {
    console.error('[AP→Finance] sync failed:', err);
    return null;
  }
}

function _apAddPendingSync(invoiceId, paymentId) {
  try {
    const q = JSON.parse(localStorage.getItem('ap_pending_sync') || '[]');
    if (!q.find(x => x.invoiceId === invoiceId && x.paymentId === paymentId)) {
      q.push({ invoiceId, paymentId, addedAt: new Date().toISOString() });
      localStorage.setItem('ap_pending_sync', JSON.stringify(q));
    }
  } catch(e) {}
}

async function retrySyncAPQueue() {
  if (!_fbdb) { toast('ไม่ได้เชื่อม Firebase', 'err'); return; }
  const q = JSON.parse(localStorage.getItem('ap_pending_sync') || '[]');
  if (!q.length) { toast('ไม่มีรายการ sync ค้างอยู่', 'info'); return; }
  let ok = 0; const remaining = [];
  for (const item of q) {
    const inv = (data.ap_invoices||[]).find(i => i.id === item.invoiceId);
    if (!inv) continue;
    const pmt = (inv.payments||[]).find(p => p.id === item.paymentId &&
      (p.syncStatus === 'failed' || p.syncStatus === 'pending' || !p.syncStatus));
    if (!pmt) continue;
    let freshFinance;
    try { freshFinance = await findNextOpenAPFinanceDate(pmt.paymentDate || pmt.date); }
    catch(e) { remaining.push(item); continue; }
    const updatedPmt = { ...pmt, financeDate: freshFinance.financeDate, financeMonth: freshFinance.financeMonth, shiftedToNextOpenMonth: freshFinance.shifted, shiftedReason: freshFinance.reason };
    const txId = await syncAPPaymentToFinance(inv, updatedPmt);
    if (txId) {
      const finalPayments = (inv.payments||[]).map(p => p.id === pmt.id ? { ...p, ...updatedPmt, financeTransactionId: txId, syncStatus: 'synced' } : p);
      await storeUpdate('ap_invoices', inv.id, { payments: finalPayments }).catch(()=>{});
      Object.assign(inv, { payments: finalPayments });
      syncLS('ap_invoices', data.ap_invoices);
      ok++;
    } else { remaining.push(item); }
  }
  localStorage.setItem('ap_pending_sync', JSON.stringify(remaining));
  toast(`Retry: สำเร็จ ${ok} รายการ${remaining.length ? `, ยังค้าง ${remaining.length} รายการ` : ''}`, ok > 0 ? 'ok' : 'err');
}
window.retrySyncAPQueue = retrySyncAPQueue;

// ══════════════════════════════════════
// FIREBASE SYNC
// ══════════════════════════════════════
async function pullFromFirebase() {
  if (!_fbdb) { toast('ไม่ได้เชื่อมต่อ Firebase', 'err'); return; }
  setSyncStatus('syncing');
  for (const col of SYNC_COLS) {
    const rows = await fbGetAll(col);
    if (rows !== null) {
      lsSave(col, rows);
      data[col] = rows;
      if (col === 'companies') companies = rows;
    }
  }
  setSyncStatus('online');
  toast('ดึงข้อมูลจาก Firebase สำเร็จ', 'ok');
  goPage(_currentPage);
}

async function pushToFirebase() {
  if (!_fbdb) { toast('ไม่ได้เชื่อมต่อ Firebase', 'err'); return; }
  setSyncStatus('syncing');
  const batch = _fbdb.batch();
  let count = 0;
  for (const col of SYNC_COLS) {
    const arr = data[col] || [];
    for (const item of arr) {
      const {id, ...rest} = item;
      batch.set(_fbdb.collection(col).doc(id), {...rest, _syncedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge: true});
      count++;
    }
  }
  try { await batch.commit(); setSyncStatus('online'); toast(`Push สำเร็จ (${count} รายการ)`, 'ok'); }
  catch(e) { setSyncStatus('error'); toast('Push ไม่สำเร็จ: ' + e.message, 'err'); }
}

function startListeners() {
  SYNC_COLS.forEach(col => {
    if (_listeners[col]) return;
    _listeners[col] = _fbdb.collection(col).onSnapshot(snap => {
      if (Date.now() - _lastLocalWrite < 3000) return;
      const rows = snap.docs.map(d => ({id: d.id, ...d.data()}));
      lsSave(col, rows);
      data[col] = rows;
      if (col === 'companies') companies = rows;
      if (_isFormOpen) {
        _pendingRefreshCols.add(col);
        toast(`⚠️ ข้อมูล ${col} อัปเดตจากเครื่องอื่น — จะโหลดใหม่เมื่อปิดฟอร์ม`, 'info');
      } else {
        goPage(_currentPage);
      }
    }, ()=>{});
  });
}

function _checkPendingRefresh() {
  if (_pendingRefreshCols.size > 0) { _pendingRefreshCols.clear(); goPage(_currentPage); }
}

// ══════════════════════════════════════

// ══════════════════════════════════════
async function loadData() {
  setLoadMsg('โหลดข้อมูลจาก localStorage...');
  for (const col of SYNC_COLS) {
    const local = lsLoad(col);
    if (local) { data[col] = local; if (col === 'companies') companies = local; }
  }
  setLoadMsg('เชื่อมต่อ Firebase...');
  const fbOk = initFirebase();
  if (fbOk) {
    for (const col of SYNC_COLS) {
      const rows = await fbGetAll(col);
      if (rows !== null) { data[col] = rows; lsSave(col, rows); if (col === 'companies') companies = rows; }
    }
    startListeners();
  }
  document.getElementById('loading-screen').classList.add('fade-out');
  setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 500);
  goPage('dashboard');
}

// HELPERS
// ══════════════════════════════════════
function fmt(n) { return Number(n || 0).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(s) { if (!s) return '-'; try { const d = new Date(s); return d.toLocaleDateString('th-TH', {year:'numeric',month:'short',day:'numeric'}); } catch(e) { return s; } }
function today() { return new Date().toISOString().slice(0,10); }
function addDays(dateStr, days) { const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + parseInt(days)); return d.toISOString().slice(0,10); }
function daysDiff(dateStr) { const d = new Date(dateStr + 'T00:00:00'); const now = new Date(); now.setHours(0,0,0,0); return Math.floor((d - now) / 86400000); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function invStatus(inv) {
  const paid = (inv.payments || []).reduce((s, p) => s + Number(p.amount || 0), 0);
  const total = Number(inv.totalAmount || 0);
  if (inv.status === 'cancelled') return 'cancelled';
  if (paid >= total) return 'paid';
  if (paid > 0) return 'partial';
  if (inv.dueDate && daysDiff(inv.dueDate) < 0) return 'overdue';
  return 'pending';
}

function invPaid(inv) { return (inv.payments || []).reduce((s, p) => s + Number(p.amount || 0), 0); }
function invRemain(inv) { return Math.max(0, Number(inv.totalAmount || 0) - invPaid(inv)); }

function statusBadge(s) {
  const map = {pending:'badge-pending',partial:'badge-partial',paid:'badge-paid',overdue:'badge-overdue',cancelled:'badge-cancelled'};
  const labels = {pending:'รอจ่าย',partial:'จ่ายบางส่วน',paid:'จ่ายแล้ว',overdue:'เกินกำหนด',cancelled:'ยกเลิก'};
  return `<span class="badge ${map[s]||'badge-pending'}">${labels[s]||s}</span>`;
}

function getCompanyName(id) { const c = companies.find(x => x.id === id); return c ? c.name : id || '-'; }
function getVendorName(id) { const v = (data.vendors || []).find(x => x.id === id); return v ? v.name : id || '-'; }

function nextInvNo() {
  const nums = (data.ap_invoices || []).map(i => {
    const m = (i.docNo || '').match(/VINV-(\d+)/);
    return m ? parseInt(m[1]) : 0;
  });
  const max = nums.length ? Math.max(...nums) : 0;
  return 'VINV-' + String(max + 1).padStart(4, '0');
}

// DASHBOARD
// ══════════════════════════════════════
function renderDashboard() {
  const invs = data.ap_invoices || [];
  const totalOutstanding = invs.filter(i => invStatus(i) !== 'paid' && invStatus(i) !== 'cancelled').reduce((s, i) => s + invRemain(i), 0);
  const overdue = invs.filter(i => invStatus(i) === 'overdue').reduce((s, i) => s + invRemain(i), 0);
  const dueThisMonth = invs.filter(i => {
    const st = invStatus(i);
    if (st === 'paid' || st === 'cancelled') return false;
    if (!i.dueDate) return false;
    const d = new Date(i.dueDate); const now = new Date();
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }).reduce((s, i) => s + invRemain(i), 0);
  const paidThisMonth = invs.filter(i => {
    const pmts = (i.payments || []).filter(p => { const d = new Date(p.date); const n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth(); });
    return pmts.length > 0;
  }).reduce((s, i) => s + (i.payments||[]).filter(p => { const d = new Date(p.date); const n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth(); }).reduce((a, p) => a + Number(p.amount||0), 0), 0);

  // Aging
  const aging = {current: 0, d30: 0, d60: 0, d90: 0, d90p: 0};
  invs.forEach(i => {
    const st = invStatus(i); if (st === 'paid' || st === 'cancelled') return;
    const remain = invRemain(i); if (!remain) return;
    const diff = i.dueDate ? daysDiff(i.dueDate) : 0;
    if (diff >= 0) aging.current += remain;
    else if (diff >= -30) aging.d30 += remain;
    else if (diff >= -60) aging.d60 += remain;
    else if (diff >= -90) aging.d90 += remain;
    else aging.d90p += remain;
  });
  const agingTotal = aging.current + aging.d30 + aging.d60 + aging.d90 + aging.d90p || 1;

  // Recent invoices
  const recent = [...invs].sort((a, b) => (b.createdAt||'').localeCompare(a.createdAt||'')).slice(0, 5);

  document.getElementById('page-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card red"><div class="stat-label">ยอดค้างจ่ายทั้งหมด</div><div class="stat-value">฿${fmt(totalOutstanding)}</div><div class="stat-note">${invs.filter(i=>invStatus(i)!=='paid'&&invStatus(i)!=='cancelled').length} รายการ</div></div>
      <div class="stat-card red"><div class="stat-label">เกินกำหนดชำระ</div><div class="stat-value">฿${fmt(overdue)}</div><div class="stat-note">${invs.filter(i=>invStatus(i)==='overdue').length} รายการ</div></div>
      <div class="stat-card orange"><div class="stat-label">ครบกำหนดเดือนนี้</div><div class="stat-value">฿${fmt(dueThisMonth)}</div><div class="stat-note"></div></div>
      <div class="stat-card green"><div class="stat-label">จ่ายแล้วเดือนนี้</div><div class="stat-value">฿${fmt(paidThisMonth)}</div><div class="stat-note"></div></div>
    </div>
    <div class="report-grid">
      <div class="card" style="margin-bottom:0">
        <div class="card-header"><span class="card-title">AP Aging Summary</span></div>
        <div class="card-body">
          ${agingBar('ยังไม่ถึงกำหนด', aging.current, agingTotal, '#15803d')}
          ${agingBar('1–30 วัน', aging.d30, agingTotal, '#f97316')}
          ${agingBar('31–60 วัน', aging.d60, agingTotal, '#c2410c')}
          ${agingBar('61–90 วัน', aging.d90, agingTotal, '#b91c1c')}
          ${agingBar('มากกว่า 90 วัน', aging.d90p, agingTotal, '#7f1d1d')}
        </div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-header"><span class="card-title">ใบแจ้งหนี้ล่าสุด</span><button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="goPage('invoices')">ดูทั้งหมด</button></div>
        <div class="card-body" style="padding:0">
          ${recent.length ? `<table class="tbl"><thead><tr><th>เลขที่</th><th>เจ้าหนี้</th><th class="r">ค้างจ่าย</th><th>สถานะ</th></tr></thead><tbody>${recent.map(i=>`<tr><td class="mono" style="color:var(--accent);cursor:pointer" onclick="viewInvoice('${i.id}')">${escHtml(i.docNo)}</td><td>${escHtml(getVendorName(i.vendorId))}</td><td class="r mono">฿${fmt(invRemain(i))}</td><td>${statusBadge(invStatus(i))}</td></tr>`).join('')}</tbody></table>` : '<div class="empty"><div class="empty-icon">📭</div><p>ยังไม่มีข้อมูล</p></div>'}
        </div>
      </div>
    </div>`;
}

function agingBar(label, val, total, color) {
  const pct = Math.min(100, Math.round((val / total) * 100));
  return `<div class="aging-row"><div class="aging-label">${label}</div><div class="aging-bar-wrap"><div class="aging-bar" style="width:${pct}%;background:${color}">${pct > 15 ? '฿' + fmt(val) : ''}</div></div><div class="aging-val" style="color:${color}">฿${fmt(val)}</div></div>`;
}

      <span style="font-size:12px;color:var(--ink4)">${rows.length} รายการ</span>
    </div>
    <div class="card">
      ${rows.length === 0 ? '<div class="empty"><div class="empty-icon">📭</div><p>ไม่พบรายการ</p></div>' : `

            <td class="hide-mobile muted" style="font-size:11px">${escHtml(i.docType||'ใบแจ้งหนี้')}</td>

    </div>`;
}
window.refreshInvTable = refreshInvTable;

function viewInvoice(id) {
  const inv = (data.ap_invoices || []).find(x => x.id === id);
  if (!inv) return;
  const st = invStatus(inv);
  const paid = invPaid(inv);
  const remain = invRemain(inv);
  const pct = Number(inv.totalAmount) > 0 ? Math.min(100, Math.round((paid / Number(inv.totalAmount)) * 100)) : 0;
  const barColor = pct >= 100 ? 'green' : pct > 0 ? 'orange' : 'red';

  document.getElementById('modal-invoice').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>

      <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--ink4);margin-bottom:2px">เจ้าหนี้ (Vendor)</div><div style="font-size:13px;font-weight:600">${escHtml(getVendorName(inv.vendorId))}</div></div>

let _editAttachData = null, _editAttachName = '', _editAttachSize = '';
let _pendingAttach = null;

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('file-drop-zone').style.borderColor = '';
  const file = e.dataTransfer?.files?.[0];
  if (file) processFile(file);
}
window.handleDrop = handleDrop;

function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  processFile(file);
}
window.handleFile = handleFile;

function processFile(file) {
  if (file.size > 5 * 1024 * 1024) { toast('ไฟล์ใหญ่เกิน 5MB', 'err'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    _pendingAttach = {data: ev.target.result, name: file.name, size: formatFileSize(file.size), type: file.type};
    const wrap = document.getElementById('file-preview-wrap');
    if (wrap) wrap.innerHTML = `
      <div class="file-preview">
        <div class="file-icon">${file.type.includes('pdf')?'📄':'🖼️'}</div>
        <div class="file-name">${escHtml(file.name)}</div>
        <div class="file-size">${formatFileSize(file.size)}</div>
        <button class="file-del" onclick="clearFile()">✕</button>
      </div>`;
    const ocrWrap = document.getElementById('ocr-btn-wrap');
    if (ocrWrap) ocrWrap.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearFile() {
  _pendingAttach = null; _editAttachData = null;
  const wrap = document.getElementById('file-preview-wrap'); if (wrap) wrap.innerHTML = '';
  const ep = document.getElementById('existing-file-preview'); if (ep) ep.remove();
  const ocrWrap = document.getElementById('ocr-btn-wrap'); if (ocrWrap) ocrWrap.style.display = 'none';
  const ocrStatus = document.getElementById('ocr-status'); if (ocrStatus) ocrStatus.innerHTML = '';
  const fi = document.getElementById('file-inp'); if (fi) fi.value = '';
}
window.clearFile = clearFile;

function formatFileSize(b) { if (b < 1024) return b+'B'; if (b < 1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }

async function runOCR() {
  const attach = _pendingAttach || (_editAttachData ? {data: _editAttachData, name: _editAttachName, type: _editAttachData.startsWith('data:image') ? 'image/jpeg' : 'application/pdf'} : null);
  if (!attach) { toast('กรุณาเลือกไฟล์ก่อน', 'err'); return; }

  const btn = document.getElementById('btn-ocr');
  const statusEl = document.getElementById('ocr-status');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังอ่านเอกสาร...';
  statusEl.innerHTML = `<div style="font-size:12px;color:var(--ink3);padding:8px 12px;background:var(--accent-light);border-radius:var(--r);border-left:3px solid var(--accent)">🤖 AI กำลังวิเคราะห์เอกสาร กรุณารอสักครู่...</div>`;

  try {
    // แยก base64 data ออกจาก data URL
    const dataUrl = attach.data;
    const [header, b64] = dataUrl.split(',');
    const mimeMatch = header.match(/data:([^;]+)/);
    const mimeType = mimeMatch ? mimeMatch[1] : (attach.type || 'image/jpeg');
    const isPdf = mimeType === 'application/pdf';

    // build content block
    const fileBlock = isPdf
      ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } }
      : { type: 'image',    source: { type: 'base64', media_type: mimeType, data: b64 } };

    // vendor list สำหรับ matching
    const vendorList = (data.vendors||[]).map(v => `- id:${v.id} name:"${v.name}" taxId:"${v.taxId||''}"`).join('\n');

    const prompt = `คุณเป็นผู้เชี่ยวชาญด้านบัญชีไทย กรุณาอ่านเอกสารนี้แล้วดึงข้อมูลออกมาให้ครบถ้วนและแม่นยำ

รายชื่อเจ้าหนี้ในระบบ (ถ้าพบชื่อตรงกันให้ใส่ vendorId ด้วย):
${vendorList || '(ยังไม่มีเจ้าหนี้ในระบบ)'}

วันปัจจุบัน: ${today()} (ใช้อ้างอิงถ้าวันที่ในเอกสารเป็นรูปแบบย่อหรือปีพ.ศ.)

ตอบเป็น JSON เท่านั้น ไม่มีข้อความอื่น:
{
  "docType": "ใบวางบิล หรือ ใบแจ้งหนี้ หรือ ใบเสนอราคา ตามที่ระบุในเอกสาร",
  "vendorId": "id จาก list ด้านบน หรือ null",
  "vendorName": "ชื่อผู้ออกเอกสาร/เจ้าหนี้ (ไม่ใช่ชื่อลูกค้า)",
  "vendorTaxId": "เลขผู้เสียภาษีของผู้ออกเอกสาร 13 หลัก หรือ null",
  "vendorRef": "เลขที่เอกสารของเจ้าหนี้ เช่น 69/005",
  "vendorBank": "ชื่อธนาคารที่เจ้าหนี้ให้โอนเงินเข้า หรือ null",
  "vendorBankAcc": "เลขบัญชีธนาคารของเจ้าหนี้ หรือ null",
  "vendorBankName": "ชื่อบัญชีธนาคาร (ชื่อผู้รับเงิน) อาจเป็นชื่อบุคคลหรือนิติบุคคล หรือ null",
  "invoiceDate": "YYYY-MM-DD วันที่ออกเอกสาร หรือ null",
  "dueDate": "YYYY-MM-DD วันครบกำหนดชำระ หรือ null",
  "paymentDays": จำนวนวันเครดิต (number) หรือ 30,
  "items": [
    {"desc": "รายละเอียดสินค้า/บริการ", "qty": จำนวน, "price": ราคาต่อหน่วย}
  ],

  "prePmts": [
    {
      "amount": จำนวนเงินที่ชำระแล้ว (number),
      "date": "YYYY-MM-DD วันที่ชำระ",
      "note": "หมายเหตุเช่น ชำระ 50%"
    }
  ],
  "note": "หมายเหตุอื่นๆ เช่น ข้อมูลการโอนเงิน หรือ null"
}

สำคัญ:
- prePmts คือการชำระที่ระบุในเอกสาร เช่น "ชำระแล้ว 50% วันที่ XX/XX/XX" ให้คำนวณยอดเงินจาก % ของยอดรวม
- ถ้าไม่มีการชำระ ให้ prePmts = []
- วันที่ปีพ.ศ. ให้แปลงเป็นปีค.ศ. (ลบ 543)
- ผู้ออกเอกสาร (เจ้าหนี้) คือบริษัทที่อยู่ด้านบน/หัวกระดาษ ไม่ใช่ "ลูกค้า"`;


    const claudeKey = localStorage.getItem('ap_claude_api_key') || '';
    if (!claudeKey) { toast('กรุณาตั้งค่า Claude API Key ในหน้าตั้งค่าก่อน', 'err'); btn.disabled = false; btn.textContent = '🤖 อ่านใบแจ้งหนี้อัตโนมัติ'; statusEl.innerHTML = ''; return; }

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [fileBlock, { type: 'text', text: prompt }]
        }]
      })
    });

    if (!response.ok) throw new Error('API ตอบกลับ ' + response.status);
    const result = await response.json();
    const text = (result.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');

    // parse JSON from response
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('ไม่พบข้อมูล JSON ในคำตอบ');
    const parsed = JSON.parse(jsonMatch[0]);

    // กรอกฟอร์ม
    applyOCRResult(parsed);

    statusEl.innerHTML = `<div style="font-size:12px;color:var(--green);padding:8px 12px;background:var(--green-light);border-radius:var(--r);border-left:3px solid var(--green)">✅ อ่านเอกสารสำเร็จ — กรุณาตรวจสอบข้อมูลก่อนบันทึก</div>`;
    btn.textContent = '🔄 อ่านใหม่';

  } catch(e) {
    console.error('OCR error:', e);
    statusEl.innerHTML = `<div style="font-size:12px;color:var(--red);padding:8px 12px;background:var(--red-light);border-radius:var(--r);border-left:3px solid var(--red)">❌ อ่านไม่สำเร็จ: ${escHtml(e.message)} — กรุณากรอกข้อมูลเอง</div>`;
    btn.textContent = '🔄 ลองใหม่';
  }
  btn.disabled = false;
}

function applyOCRResult(d) {
  // docType
  if (d.docType) { const el = document.getElementById('f-docType'); if(el) { ['ใบแจ้งหนี้','ใบวางบิล','ใบเสนอราคา'].forEach(t => { if(d.docType.includes(t)) el.value = t; }); } }
  // Vendor
  if (d.vendorId) { const sel = document.getElementById('f-vendorId'); if(sel) sel.value = d.vendorId; }
  // Vendor ref
  if (d.vendorRef) { const el = document.getElementById('f-vendorRef'); if(el) el.value = d.vendorRef; }
  // Vendor bank
  if (d.vendorBank) { const el = document.getElementById('f-vendorBank'); if(el) el.value = d.vendorBank; }
  if (d.vendorBankAcc) { const el = document.getElementById('f-vendorBankAcc'); if(el) el.value = d.vendorBankAcc; }
  if (d.vendorBankName) { const el = document.getElementById('f-vendorBankName'); if(el) el.value = d.vendorBankName; }
  // Dates
  if (d.invoiceDate) { const el = document.getElementById('f-invoiceDate'); if(el) el.value = d.invoiceDate; }
  if (d.dueDate) { const el = document.getElementById('f-dueDate'); if(el) el.value = d.dueDate; }
  if (d.paymentDays) { const el = document.getElementById('f-payDays'); if(el) el.value = d.paymentDays; }
  // VAT / WHT
  if (d.vatPct !== undefined) { const el = document.getElementById('f-vatPct'); if(el) el.value = String(d.vatPct); }
  if (d.whtPct !== undefined) { const el = document.getElementById('f-whtPct'); if(el) el.value = String(d.whtPct); }
  // Note
  if (d.note) { const el = document.getElementById('f-note'); if(el && !el.value) el.value = d.note; }
  // Items
  if (d.items && d.items.length > 0) {
    window._items = d.items.map(it => ({ desc: String(it.desc||''), qty: Number(it.qty)||1, price: Number(it.price)||0 }));
    renderItems();
  }
  calcTotals();

  // Pre-payments (ชำระแล้วก่อนบันทึก)
  if (d.prePmts && d.prePmts.length > 0) {
    window._prePmts = d.prePmts.map(p => ({
      id: uid(), amount: Number(p.amount)||0, date: p.date||today(), note: p.note||'ชำระก่อนบันทึก', method: 'โอนเงิน'
    }));
    showPrePmt();
    renderPrePmts();
    const statusEl = document.getElementById('ocr-status');
    const total = window._prePmts.reduce((s,p)=>s+p.amount,0);
    if(statusEl) statusEl.innerHTML += `<div style="font-size:11px;color:var(--blue);padding:6px 10px;background:var(--blue-light);border-radius:var(--r);margin-top:6px;border-left:3px solid var(--blue)">💸 พบการชำระเงินก่อนหน้า <b>฿${fmt(total)}</b> — จะบันทึกเป็น payment อัตโนมัติเมื่อกดบันทึก</div>`;
  }

  // vendor not found warning

async function saveInvoice(editId) {
  try {
    const companyId = document.getElementById('f-companyId').value;
    const vendorId = document.getElementById('f-vendorId').value;
    const docNo = document.getElementById('f-docNo').value.trim();
    const invoiceDate = document.getElementById('f-invoiceDate').value;
    const dueDate = document.getElementById('f-dueDate').value;
    if (!companyId) { toast('กรุณาเลือกบริษัท', 'err'); return; }
    if (!vendorId) { toast('กรุณาเลือกเจ้าหนี้', 'err'); return; }
    if (!docNo) { toast('กรุณาระบุเลขที่เอกสาร', 'err'); return; }
    if (!invoiceDate) { toast('กรุณาระบุวันที่', 'err'); return; }
    if (!window._items || window._items.length === 0 || !window._items.some(it => it.desc?.trim())) { toast('กรุณาเพิ่มรายการสินค้า/บริการอย่างน้อย 1 รายการ', 'err'); return; }

    const sub = window._items.reduce((s,it) => s + Number(it.qty||0)*Number(it.price||0), 0);
    const vatPct = Number(document.getElementById('f-vatPct').value);
    const whtPct = Number(document.getElementById('f-whtPct').value);
    const vatAmt = sub * vatPct / 100;
    const whtAmt = sub * whtPct / 100;
    const total = sub + vatAmt - whtAmt;

    // attach
    let attachFile = _editAttachData, attachFileName = _editAttachName, attachFileSize = _editAttachSize;
    if (_pendingAttach) { attachFile = _pendingAttach.data; attachFileName = _pendingAttach.name; attachFileSize = _pendingAttach.size; }

    const d = {
      docType: document.getElementById('f-docType').value || 'ใบแจ้งหนี้',
      companyId, vendorId, docNo,
      vendorRef: document.getElementById('f-vendorRef')?.value.trim() || '',
      vendorBank: document.getElementById('f-vendorBank').value.trim(),
      vendorBankAcc: document.getElementById('f-vendorBankAcc').value.trim(),
      vendorBankName: document.getElementById('f-vendorBankName').value.trim(),
      invoiceDate, dueDate,
      paymentDays: Number(document.getElementById('f-payDays').value || 30),
      payMethod: document.getElementById('f-payMethod').value,
      items: window._items.map(it => ({desc: it.desc, qty: Number(it.qty), price: Number(it.price)})),
      subTotal: sub, vatPct, vatAmt, whtPct, whtAmt, totalAmount: total,
      note: document.getElementById('f-note').value.trim(),
      attachFile, attachFileName, attachFileSize,
    };

    if (editId) {
      const ok = await storeUpdate('ap_invoices', editId, d);
      if (ok) { syncLS('ap_invoices', data.ap_invoices); toast('แก้ไขสำเร็จ','ok'); goPage('invoices'); }
    } else {
      // pre-payments จาก OCR หรือกรอกเอง → บันทึกเป็น payments ทันที
      const prePmts = (window._prePmts||[]).filter(p => Number(p.amount)>0).map(p => ({
        ...p, id: p.id || uid(), method: p.method||'โอนเงิน'
      }));
      d.payments = prePmts;
      window._prePmts = [];
      const id = await storeAdd('ap_invoices', d);
      if (id) { data.ap_invoices.push({id, ...d}); syncLS('ap_invoices', data.ap_invoices); toast('บันทึกใบแจ้งหนี้สำเร็จ'+(prePmts.length?` (มี ${prePmts.length} รายการชำระแล้ว)`:''), 'ok'); goPage('invoices'); }
    }
  } catch(e) { toast('เกิดข้อผิดพลาด: ' + e.message, 'err'); }
}
window.saveInvoice = saveInvoice;

async function confirmPayment() {
  if (!_payingInvoice) return;
  try {
    const amount = Number(document.getElementById('pmt-amount').value);
    const pmtDate = document.getElementById('pmt-date').value;
    const method = document.getElementById('pmt-method').value;
    const ref = document.getElementById('pmt-ref').value.trim();
    const note = document.getElementById('pmt-note').value.trim();
    if (!amount || amount <= 0) { toast('กรุณาระบุจำนวนเงิน', 'err'); return; }
    const remain = invRemain(_payingInvoice);
    if (amount > remain + 0.01) { toast(`จำนวนเงินเกินยอดค้างจ่าย (฿${fmt(remain)})`, 'err'); return; }

    // หา financeDate (เลื่อนเดือนถ้า Finance ปิดงวด)
    let financeInfo;
    try { financeInfo = await findNextOpenAPFinanceDate(pmtDate); }
    catch(e) { toast('เกิดข้อผิดพลาด: ' + e.message, 'err'); return; }
    if (financeInfo.shifted) {
      toast(`เดือน ${pmtDate.slice(0,7)} ปิดแล้ว — จะลงบัญชี Finance ในเดือน ${financeInfo.financeMonth} แทน`, 'info');
    }

    const pmt = {
      id: uid(),
      date: pmtDate, paymentDate: pmtDate,
      financeDate: financeInfo.financeDate,
      financeMonth: financeInfo.financeMonth,
      originalPaymentMonth: pmtDate.slice(0,7),
      shiftedToNextOpenMonth: financeInfo.shifted,
      shiftedReason: financeInfo.reason,
      amount, method, ref, note,
      createdAt: new Date().toISOString(),
      financeTransactionId: null,
      syncStatus: 'pending',
    };
    const pmts = [...(_payingInvoice.payments || []), pmt];
    const ok = await storeUpdate('ap_invoices', _payingInvoice.id, {payments: pmts});
    if (ok) {
      _payingInvoice.payments = pmts;
      syncLS('ap_invoices', data.ap_invoices);
      toast('บันทึกการจ่ายเงินสำเร็จ','ok');
      closeModal();
      goPage('invoices');
      // sync ไป fin_transactions แบบ background
      syncAPPaymentToFinance(_payingInvoice, pmt).then(txId => {
        const syncSt = txId ? 'synced' : 'failed';
        const finalPmts = (_payingInvoice.payments||[]).map(p =>
          p.id === pmt.id ? {...p, financeTransactionId: txId||null, syncStatus: syncSt} : p);
        storeUpdate('ap_invoices', _payingInvoice.id, {payments: finalPmts}).catch(()=>{});
        Object.assign(_payingInvoice, {payments: finalPmts});
        syncLS('ap_invoices', data.ap_invoices);
        if (!txId) _apAddPendingSync(_payingInvoice.id, pmt.id);
      }).catch(e => {
        console.warn('[AP→Finance] background sync error:', e);
        _apAddPendingSync(_payingInvoice.id, pmt.id);
      });
    }
  } catch(e) { toast('เกิดข้อผิดพลาด: ' + e.message, 'err'); }
}
window.confirmPayment = confirmPayment;

function renderAgingReport() {
  const invs = (data.ap_invoices||[]).filter(i => invStatus(i) !== 'paid' && invStatus(i) !== 'cancelled');
  const buckets = [{label:'ยังไม่ถึงกำหนด',min:0,max:Infinity,color:'#15803d'},{label:'1–30 วัน',min:1,max:30,color:'#f97316'},{label:'31–60 วัน',min:31,max:60,color:'#c2410c'},{label:'61–90 วัน',min:61,max:90,color:'#b91c1c'},{label:'มากกว่า 90 วัน',min:91,max:Infinity,color:'#7f1d1d'}];

  const aged = buckets.map(b => {
    const rows = invs.filter(i => {
      if (!i.dueDate) return b.min === 0;
      const overDays = -daysDiff(i.dueDate);
      if (overDays <= 0) return b.min === 0;
      return overDays >= b.min && overDays <= b.max;
    });
    return {...b, rows, total: rows.reduce((s,i) => s + invRemain(i), 0)};
  });
  const grandTotal = aged.reduce((s,b) => s + b.total, 0) || 1;

  document.getElementById('page-content').innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">AP Aging Report</span><span class="card-sub">ยอดค้างจ่ายจำแนกตามอายุหนี้</span></div>
      <div class="card-body">
        ${aged.map(b => agingBar(b.label, b.total, grandTotal, b.color)).join('')}
        <div style="margin-top:14px;text-align:right;font-weight:700;font-family:'IBM Plex Mono',monospace">รวมทั้งหมด: ฿${fmt(aged.reduce((s,b)=>s+b.total,0))}</div>
      </div>
    </div>
    ${aged.filter(b=>b.rows.length).map(b=>`
    <div class="card">
      <div class="card-header" style="background:${b.color}10;border-left:4px solid ${b.color}">
        <span class="card-title" style="color:${b.color}">${b.label}</span>
        <span class="card-sub" style="color:${b.color}">${b.rows.length} รายการ — ฿${fmt(b.total)}</span>
      </div>
      <table class="tbl">
        <thead><tr><th>เลขที่</th><th>เจ้าหนี้</th><th>บริษัท</th><th>ครบกำหนด</th><th class="r">ค้างจ่าย</th></tr></thead>
        <tbody>${b.rows.map(i=>`<tr>
          <td class="mono" style="color:var(--accent);cursor:pointer" onclick="viewInvoice('${i.id}')">${escHtml(i.docNo)}</td>
          <td>${escHtml(getVendorName(i.vendorId))}</td>
          <td>${escHtml(getCompanyName(i.companyId))}</td>
          <td style="color:${b.color};font-weight:600">${fmtDate(i.dueDate)}</td>
          <td class="r mono bold" style="color:${b.color}">฿${fmt(invRemain(i))}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`).join('')}`;
}

// VENDOR OUTSTANDING REPORT
// ══════════════════════════════════════
function renderVendorReport() {
  const invs = (data.ap_invoices||[]).filter(i => invStatus(i) !== 'paid' && invStatus(i) !== 'cancelled');
  const byVendor = {};
  invs.forEach(i => {
    const vId = i.vendorId || 'unknown';
    if (!byVendor[vId]) byVendor[vId] = {vendorId: vId, count: 0, total: 0, overdue: 0};
    byVendor[vId].count++;
    byVendor[vId].total += invRemain(i);
    if (invStatus(i) === 'overdue') byVendor[vId].overdue += invRemain(i);
  });
  const rows = Object.values(byVendor).sort((a,b) => b.total - a.total);

  document.getElementById('page-content').innerHTML = `
    <div class="card">
      <div class="card-header"><span class="card-title">ค้างจ่ายรายเจ้าหนี้</span></div>
      ${rows.length === 0 ? '<div class="empty" style="padding:30px"><div class="empty-icon">🎉</div><p>ไม่มียอดค้างจ่าย</p></div>' : `
      <table class="tbl">
        <thead><tr><th>เจ้าหนี้</th><th class="c">รายการ</th><th class="r">ยอดค้างจ่าย</th><th class="r">เกินกำหนด</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td style="font-weight:600">${escHtml(getVendorName(r.vendorId))}</td>
          <td class="c">${r.count}</td>
          <td class="r mono bold" style="color:var(--red)">฿${fmt(r.total)}</td>
          <td class="r mono" style="color:${r.overdue>0?'var(--red)':'var(--ink4)'}">฿${fmt(r.overdue)}</td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>`;
}

function nextVendorCode() {
  const nums = (data.vendors||[]).map(v=>{const m=(v.code||'').match(/VND-(\d+)/);return m?parseInt(m[1]):0;});
  return 'VND-' + String((nums.length?Math.max(...nums):0)+1).padStart(4,'0');
}

async function saveVendor(id) {
  const name = document.getElementById('vf-name').value.trim();
  if (!name) { toast('กรุณาระบุชื่อเจ้าหนี้','err'); return; }
  const taxId = document.getElementById('vf-taxId').value.trim();
  if (taxId && !/^\d{13}$/.test(taxId)) { toast('เลขผู้เสียภาษีต้อง 13 หลัก','err'); return; }
  const d = {
    code: document.getElementById('vf-code').value.trim(),
    name, taxId,
    address: document.getElementById('vf-address').value.trim(),
    contact: document.getElementById('vf-contact').value.trim(),
    phone: document.getElementById('vf-phone').value.trim(),
    email: document.getElementById('vf-email').value.trim(),
    bank: document.getElementById('vf-bank').value.trim(),
    bankAcc: document.getElementById('vf-bankAcc').value.trim(),
    bankName: document.getElementById('vf-bankName').value.trim(),
    paymentDays: Number(document.getElementById('vf-payDays').value||30),
    note: document.getElementById('vf-note').value.trim(),
  };
  if (!data.vendors) data.vendors = [];
  if (id) {
    const ok = await storeUpdate('vendors', id, d);
    if (ok) { Object.assign(data.vendors.find(x=>x.id===id)||{}, d); syncLS('vendors', data.vendors); toast('แก้ไขสำเร็จ','ok'); closeModal(); renderVendors(); }
  } else {
    const newId = await storeAdd('vendors', d);
    if (newId) { data.vendors.push({id:newId,...d}); syncLS('vendors', data.vendors); toast('เพิ่มเจ้าหนี้สำเร็จ','ok'); closeModal(); renderVendors(); }
  }
}
window.saveVendor = saveVendor;

async function deleteVendor(id) {
  if (!confirm('ต้องการลบเจ้าหนี้นี้?')) return;
  data.vendors = (data.vendors||[]).filter(x => x.id !== id);
  await storeDelete('vendors', id);
  syncLS('vendors', data.vendors);
  toast('ลบสำเร็จ','ok');
  renderVendors();
}
window.deleteVendor = deleteVendor;

async function saveCompany(id) {
  const name = document.getElementById('cf-name').value.trim();
  if (!name) { toast('กรุณาระบุชื่อบริษัท','err'); return; }
  const taxId = document.getElementById('cf-taxId').value.trim();
  if (taxId && !/^\d{13}$/.test(taxId)) { toast('เลขผู้เสียภาษีต้อง 13 หลัก','err'); return; }
  const d = { name, taxId, phone: document.getElementById('cf-phone').value.trim(), address: document.getElementById('cf-address').value.trim() };
  if (id) {
    const ok = await storeUpdate('companies', id, d);
    if (ok) { Object.assign(companies.find(x=>x.id===id)||{},d); data.companies=companies; syncLS('companies',companies); toast('แก้ไขสำเร็จ','ok'); closeModal(); renderCompanies(); }
  } else {
    const newId = await storeAdd('companies', d);
    if (newId) { const nc={id:newId,...d}; companies.push(nc); data.companies=companies; syncLS('companies',companies); toast('เพิ่มบริษัทสำเร็จ','ok'); closeModal(); renderCompanies(); }

async function deleteCompany(id) {

}
